<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NIFTYFLOW — Promotion Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/svg+xml" href="assets/images/logogolden.svg">
<style>
  :root {
    --bg: #f6f5f1;
    --card: #ffffff;
    --ink: #0d0d0a;
    --gold: #b8960c;
    --gold-fade: rgba(184,150,12,0.1);
    --muted: #7a7870;
    --line: #e4e0d8;
    --green: #1a7a3a;
    --green-bg: #e8f5e9;
    --red: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--line);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .logo a {
    text-decoration: none;
    color: var(--ink);
  }
  .logo span { color: var(--gold); }
  header .sub {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 0.2rem;
  }

  .progress-container {
    text-align: right;
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .progress-bar-bg {
    width: 200px;
    height: 6px;
    background: var(--line);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--gold);
    border-radius: 100px;
    transition: width 0.4s ease;
  }
  .progress-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink);
    margin-top: 0.3rem;
  }

  .filters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .reset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.1em;
    padding: 0.4rem 1rem;
    border: 1px solid rgba(192,57,43,0.2);
    border-radius: 100px;
    background: transparent;
    color: var(--red);
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .reset-btn:hover { background: rgba(192,57,43,0.05); border-color: var(--red); }

  .section {
    margin-bottom: 2rem;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover .section-toggle { opacity: 1; }
  .section-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    transition: transform 0.2s;
    opacity: 0.4;
  }
  .section-toggle.collapsed { transform: rotate(-90deg); }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
  }
  .section-body { }
  .section-body.hidden { display: none; }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    padding: 0.65rem 1rem;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    transition: all 0.2s;
    cursor: pointer;
  }
  .task:hover { border-color: var(--gold); }
  .task.completed {
    background: var(--green-bg);
    border-color: rgba(26,122,58,0.15);
  }
  .task.hidden-filter { display: none; }

  .task-check {
    width: 18px; height: 18px;
    border: 2px solid var(--line);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: all 0.2s;
  }
  .task.completed .task-check {
    background: var(--green);
    border-color: var(--green);
  }
  .task-check::after {
    content: '';
    width: 5px; height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    margin-top: -1px;
    opacity: 0;
  }
  .task.completed .task-check::after { opacity: 1; }

  .task-content {
    flex: 1;
    min-width: 0;
  }
  .task-text {
    font-size: 0.85rem;
    line-height: 1.5;
    font-weight: 400;
  }
  .task.completed .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }
  .task-detail {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 0.15rem;
    line-height: 1.4;
  }
  .task-detail em {
    font-style: italic;
    color: var(--gold);
  }

  footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  footer .copy {
    font-family: 'DM Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  footer .note {
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 300;
    font-style: italic;
  }

  @media (max-width: 600px) {
    body { padding: 1.2rem; }
    header { flex-direction: column; }
    .progress-bar-bg { width: 100%; }
    .task { padding: 0.5rem 0.7rem; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div>
      <div class="logo"><a href="https://niftyflow.in" target="_blank">Nifty<span>Flow</span></a></div>
      <div class="sub">Promotion plan tracking</div>
    </div>
    <div>
      <div class="progress-label">Overall Progress</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-num" id="progressNum">0 / 0 completed</div>
    </div>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">Pending</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done')">Completed</button>
    <button class="reset-btn" onclick="resetAll()">Reset All</button>
  </div>

  <div id="checklist"></div>

  <footer>
    <span class="copy">&copy; 2026 NIFTYFLOW</span>
    <span class="note">Progress saved automatically in your browser</span>
  </footer>

</div>

<script>
  const DATA = [
    {
      title: "Week 1-2: Foundation",
      tasks: [
        { text: "Set up Google Analytics 4", detail: "Install GA4 tracking code on niftyflow.in" },
        { text: "Set up Google Search Console", detail: "Verify ownership and submit sitemap" },
        { text: "Install Facebook Pixel", detail: "Even if not running ads yet — start collecting data" },
        { text: "Create 4 SEO pages", detail: "<em>/ai-workflow-automation</em>, <em>/whatsapp-chatbot</em>, <em>/ai-voice-agent</em>, <em>/trading-bot-development</em> — 500-800 words each" },
        { text: "Polish LinkedIn profile", detail: "Banner: 'AI Automation for Indian Businesses'. Featured section links to 3 portfolio systems" },
        { text: "Record YouTube video: AI Finance Agent demo", detail: "2-min screen recording showing the Telegram bot working live" },
        { text: "Record YouTube video: Lead Outreach walkthrough", detail: "8-min video showing the full pipeline" },
        { text: "Write Medium guest post", detail: "'I built 3 AI systems for my business — here's what I learned'" },
      ]
    },
    {
      title: "Week 3-4: Initial Outreach",
      tasks: [
        { text: "Post on LinkedIn daily", detail: "3-5 lines + screenshot showing a process before/after" },
        { text: "Join 5 Indian business groups", detail: "Facebook/WhatsApp groups — answer automation questions, don't pitch" },
        { text: "Comment on 10 posts/day", detail: "Indian startup founders (Naval, Kunal Shah, local founders) — add value, don't pitch" },
        { text: "Upload 2 more YouTube videos", detail: "Share links in LinkedIn posts and relevant subreddits" },
        { text: "Reach out to 5 small agencies", detail: "Web dev / digital marketing agencies — offer white-label automation services" },
        { text: "Start email list with Mailchimp", detail: "Add 'Subscribe for automation tips' form to niftyflow.in" },
      ]
    },
    {
      title: "Month 2-3: Scaling",
      tasks: [
        { text: "Launch LinkedIn Ads", detail: "INR 500/day targeting 'Business Owner' + 'India' + 'Entrepreneurship'. Ad: 'Free 30-min automation audit'" },
        { text: "Launch YouTube Ads", detail: "INR 300/day promoting best-performing video to Indian audiences" },
        { text: "Collaborate with 2 India business influencers", detail: "1-10K followers. Trade a free automation system for a testimonial video" },
        { text: "Launch referral program", detail: "'Refer a business owner, get 10% of their first project'" },
        { text: "Pitch to 3 Indian entrepreneur podcasts", detail: "Topic: 'Bootstrapping an AI agency with personal projects'" },
      ]
    },
    {
      title: "Ongoing",
      tasks: [
        { text: "Post 3x/week on LinkedIn", detail: "Never stop. Consistency > virality" },
        { text: "Upload 2 YouTube videos/month", detail: "Build the library of proof" },
        { text: "Send bi-weekly email newsletter", detail: "One automation tip + one tool recommendation" },
        { text: "Monthly SEO check", detail: "Search Console — find what's ranking, double down" },
        { text: "Collect testimonials after every client", detail: "Ask for a video or text quote immediately after delivery" },
      ]
    },
    {
      title: "Content Creation (Ongoing)",
      tasks: [
        { text: "LinkedIn: Before/after text post", detail: "Screenshot of a manual process vs automated. 3-5 lines." },
        { text: "YouTube: System demo video", detail: "2-3 min screen recording showing a system working live" },
        { text: "YouTube: Problem explainer video", detail: "5-8 min — 'Why your leads go cold (and the automation that fixes it)'" },
        { text: "YouTube: Build tutorial video", detail: "10-15 min — 'How I built an AI finance tracker with Python + Telegram'" },
        { text: "WhatsApp Status: Quick demo clip", detail: "15-second screen recording of bot responding to a query live" },
        { text: "Blog: How-to guide", detail: "e.g. 'How to automate WhatsApp replies with Python' — target SEO keywords" },
        { text: "Twitter/X: Thread", detail: "'6 manual tasks every business should automate today'" },
      ]
    },
    {
      title: "Metrics Check-ins",
      tasks: [
        { text: "Week 1: Check GA4 + Search Console are collecting data", detail: "Fix any tracking issues" },
        { text: "Month 1: Review KPIs — website visitors (target: 300)", detail: "Check GA4 traffic report" },
        { text: "Month 1: Review KPIs — LinkedIn followers (target: 100)", detail: "Check LinkedIn analytics" },
        { text: "Month 3: Review KPIs — website visitors (target: 2,000)", detail: "Check GA4 traffic report" },
        { text: "Month 3: Review KPIs — contact form submissions (target: 30)", detail: "Check Web3Forms + GA4" },
        { text: "Every quarter: Full strategy review", detail: "What's working? Double down. What's not? Cut it." },
      ]
    }
  ];

  const STORAGE_KEY = 'niftyflow_promotion_checklist';

  function loadState() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch { return {}; }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getTaskId(sectionIdx, taskIdx) {
    return `${sectionIdx}-${taskIdx}`;
  }

  function render() {
    const state = loadState();
    const container = document.getElementById('checklist');
    container.innerHTML = '';

    let totalTasks = 0;
    let completedTasks = 0;

    DATA.forEach((section, sIdx) => {
      section.tasks.forEach((task, tIdx) => {
        totalTasks++;
        if (state[getTaskId(sIdx, tIdx)]) completedTasks++;
      });
    });

    // progress
    document.getElementById('progressFill').style.width = totalTasks ? `${(completedTasks / totalTasks) * 100}%` : '0%';
    document.getElementById('progressNum').textContent = `${completedTasks} / ${totalTasks} completed`;

    // render sections
    DATA.forEach((section, sIdx) => {
      const sectionDiv = document.createElement('div');
      sectionDiv.className = 'section';

      const header = document.createElement('div');
      header.className = 'section-header';
      header.innerHTML = `
        <span class="section-toggle" id="toggle-${sIdx}">&#9660;</span>
        <span class="section-title">${section.title}</span>
        <span class="section-count" id="count-${sIdx}"></span>
      `;
      header.addEventListener('click', () => toggleSection(sIdx));

      const body = document.createElement('div');
      body.className = 'section-body';
      body.id = `body-${sIdx}`;

      section.tasks.forEach((task, tIdx) => {
        const id = getTaskId(sIdx, tIdx);
        const done = state[id] || false;
        const filter = currentFilter;

        const taskDiv = document.createElement('div');
        taskDiv.className = `task${done ? ' completed' : ''}`;
        if (filter === 'done' && !done) taskDiv.classList.add('hidden-filter');
        if (filter === 'pending' && done) taskDiv.classList.add('hidden-filter');
        taskDiv.dataset.taskId = id;

        taskDiv.innerHTML = `
          <div class="task-check"></div>
          <div class="task-content">
            <div class="task-text">${task.text}</div>
            ${task.detail ? `<div class="task-detail">${task.detail}</div>` : ''}
          </div>
        `;

        taskDiv.addEventListener('click', () => toggleTask(sIdx, tIdx));
        body.appendChild(taskDiv);
      });

      sectionDiv.appendChild(header);
      sectionDiv.appendChild(body);
      container.appendChild(sectionDiv);

      updateSectionCount(sIdx);
    });
  }

  function toggleTask(sIdx, tIdx) {
    const state = loadState();
    const id = getTaskId(sIdx, tIdx);
    state[id] = !state[id];
    saveState(state);
    render();
  }

  function toggleSection(sIdx) {
    const body = document.getElementById(`body-${sIdx}`);
    const toggle = document.getElementById(`toggle-${sIdx}`);
    body.classList.toggle('hidden');
    toggle.classList.toggle('collapsed');
  }

  function updateSectionCount(sIdx) {
    const state = loadState();
    const section = DATA[sIdx];
    let done = 0;
    section.tasks.forEach((_, tIdx) => {
      if (state[getTaskId(sIdx, tIdx)]) done++;
    });
    const el = document.getElementById(`count-${sIdx}`);
    if (el) el.textContent = `${done}/${section.tasks.length}`;
  }

  let currentFilter = 'all';

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });
    render();
  }

  function resetAll() {
    if (confirm('Reset all checkboxes? This cannot be undone.')) {
      localStorage.removeItem(STORAGE_KEY);
      render();
    }
  }

  render();
</script>
</body>
</html>
